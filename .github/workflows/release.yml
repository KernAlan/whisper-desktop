name: Build desktop releases

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to package and release"
        required: true
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: "22"
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  quality:
    name: Verify source
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run syntax checks
        run: npm run check

      - name: Run tests
        run: npm test

  windows:
    name: Package Windows
    needs: quality
    runs-on: windows-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npx --no-install electron-builder --win --x64

      - name: Normalize release filename
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          $installer = Get-ChildItem -Path dist -Filter "*.exe" |
            Where-Object { $_.Name -like "*Setup*" } |
            Select-Object -First 1
          if (-not $installer) {
            throw "Windows installer was not produced in dist/"
          }
          Copy-Item -LiteralPath $installer.FullName -Destination "release/Whisper-Desktop-Windows-Setup.exe"

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: desktop-windows
          path: release/Whisper-Desktop-Windows-Setup.exe
          if-no-files-found: error

  macos-arm64:
    name: Package macOS Apple Silicon
    needs: quality
    runs-on: macos-15
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS Apple Silicon disk image
        run: npx --no-install electron-builder --mac --arm64

      - name: Normalize release filename
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          dmg="$(find dist -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          test -n "$dmg"
          cp "$dmg" "release/Whisper-Desktop-macOS-Apple-Silicon.dmg"

      - name: Upload macOS Apple Silicon installer
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-arm64
          path: release/Whisper-Desktop-macOS-Apple-Silicon.dmg
          if-no-files-found: error

  macos-intel:
    name: Package macOS Intel
    needs: quality
    runs-on: macos-15-intel
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS Intel disk image
        run: npx --no-install electron-builder --mac --x64

      - name: Normalize release filename
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          dmg="$(find dist -maxdepth 1 -type f -name '*.dmg' -print -quit)"
          test -n "$dmg"
          cp "$dmg" "release/Whisper-Desktop-macOS-Intel.dmg"

      - name: Upload macOS Intel installer
        uses: actions/upload-artifact@v4
        with:
          name: desktop-macos-intel
          path: release/Whisper-Desktop-macOS-Intel.dmg
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs:
      - windows
      - macos-arm64
      - macos-intel
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged installers
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: release
          merge-multiple: true

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          name: Whisper Desktop ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            release/Whisper-Desktop-Windows-Setup.exe
            release/Whisper-Desktop-macOS-Apple-Silicon.dmg
            release/Whisper-Desktop-macOS-Intel.dmg
