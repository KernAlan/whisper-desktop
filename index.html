<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
        <title>Whisper Desktop</title>
        <style>
            :root {
                --ink: #ece4d3;
                --muted: #948a7c;
                --faint: #6d6355;
                --bg: #171310;
                --bg-raised: #1d1813;
                --bg-chip: #241e17;
                --line: rgba(212, 164, 55, 0.14);
                --line-soft: rgba(236, 228, 211, 0.08);
                --accent: #d4a437;
                --accent-bright: #ecc45f;
                --recording: #e0655a;
                --working: #d9b04a;
                --done: #93bf7f;
            }
            html {
                background: transparent;
            }
            html, body {
                height: 100%;
                box-sizing: border-box;
            }
            body {
                font-family: "Aptos", "Segoe UI", sans-serif;
                background:
                    radial-gradient(120% 90% at 50% 0%, rgba(212, 164, 55, 0.06), transparent 60%),
                    var(--bg);
                color: var(--ink);
                margin: 0;
                padding: 0;
                border: 1px solid rgba(212, 164, 55, 0.22);
                border-radius: 12px;
                box-shadow: 0 22px 48px rgba(0, 0, 0, 0.45);
                overflow: hidden;
                display: flex;
                flex-direction: column;
                user-select: none;
                -webkit-user-select: none;
                -webkit-app-region: drag;
            }
            .titlebar {
                display: grid;
                grid-template-columns: 1fr auto 1fr;
                align-items: center;
                padding: 9px 12px;
                border-bottom: 1px solid rgba(190, 74, 66, 0.35);
            }
            .apptitle {
                font-family: "Bahnschrift", "Aptos", "Segoe UI", sans-serif;
                color: var(--muted);
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 0.28em;
                text-transform: uppercase;
                white-space: nowrap;
            }
            #closeWindow {
                -webkit-app-region: no-drag;
                justify-self: end;
                background: transparent;
                border: none;
                border-radius: 5px;
                color: var(--muted);
                cursor: pointer;
                font-size: 13px;
                line-height: 1;
                height: 20px;
                width: 22px;
                padding: 0;
            }
            #closeWindow:hover {
                background: rgba(212, 164, 55, 0.14);
                color: var(--accent-bright);
            }
            main {
                display: flex;
                flex-direction: column;
                flex: 1;
                min-height: 0;
                padding: 13px 16px 13px;
            }
            .statusRow {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
            }
            #status {
                font-family: "Bahnschrift", "Aptos", "Segoe UI", sans-serif;
                color: var(--accent);
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.18em;
                text-transform: uppercase;
                overflow-wrap: anywhere;
            }
            #settingsButton {
                -webkit-app-region: no-drag;
                background: var(--bg-chip);
                border: 1px solid var(--line-soft);
                border-radius: 7px;
                color: #c9c1b2;
                cursor: pointer;
                font: inherit;
                font-size: 11px;
                padding: 5px 11px;
                white-space: nowrap;
            }
            #settingsButton:hover {
                border-color: rgba(212, 164, 55, 0.4);
                color: var(--ink);
            }
            #hotkeyHint {
                color: var(--muted);
                font-size: 12px;
                line-height: 1.4;
                margin: 5px 0 0;
            }
            #selectedText {
                border-left: 3px solid var(--accent);
                color: var(--muted);
                display: none;
                font-size: 11px;
                line-height: 1.35;
                margin: 9px 0 0;
                max-height: 42px;
                overflow: hidden;
                padding-left: 8px;
                white-space: pre-wrap;
                overflow-wrap: anywhere;
            }
            .wavePanel {
                background: var(--bg-raised);
                border: 1px solid var(--line);
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 62px;
                flex-shrink: 0;
                margin: 12px 0;
            }
            .wave {
                display: flex;
                align-items: center;
                gap: 3px;
                height: 44px;
            }
            .wave span {
                background: linear-gradient(180deg, var(--accent-bright), #a87c1c);
                border-radius: 2px;
                height: 100%;
                width: 4px;
                opacity: 0.45;
                transform: scaleY(0.06);
                transform-origin: center;
                transition: transform 80ms ease-out, opacity 0.4s ease;
            }
            body[data-phase="recording"] .wave span,
            body[data-phase="preview"] .wave span {
                opacity: 1;
            }
            #previewPanel {
                background: var(--bg-raised);
                border: 1px solid var(--line);
                border-radius: 10px;
                min-height: 72px;
                overflow: hidden;
                padding: 11px 13px;
            }
            #previewMeta {
                font-family: "Bahnschrift", "Aptos", "Segoe UI", sans-serif;
                color: var(--faint);
                font-size: 10px;
                font-weight: 600;
                letter-spacing: 0.2em;
                margin-bottom: 7px;
                text-transform: uppercase;
            }
            #previewText {
                color: var(--ink);
                font-size: 13px;
                line-height: 1.4;
                max-height: 116px;
                overflow: hidden;
                white-space: pre-wrap;
                overflow-wrap: anywhere;
            }
            #previewText::after {
                content: "";
                display: inline-block;
                background: var(--accent-bright);
                height: 1em;
                width: 2px;
                margin-left: 3px;
                vertical-align: -0.15em;
                animation: caretBlink 1.1s steps(1) infinite;
            }
            @keyframes caretBlink {
                50% { opacity: 0; }
            }
            #recoveryActions {
                display: none;
                flex-wrap: wrap;
                gap: 8px;
                margin-top: 10px;
                -webkit-app-region: no-drag;
            }
            #recoveryActions button {
                background: var(--bg-chip);
                border: 1px solid var(--line-soft);
                border-radius: 6px;
                color: var(--ink);
                cursor: pointer;
                font: inherit;
                font-size: 11px;
                font-weight: 700;
                height: 28px;
                padding: 0 10px;
            }
            #recoveryActions button:hover {
                border-color: rgba(212, 164, 55, 0.4);
            }
            #retryRecovery,
            #retryMic,
            #retryPaste,
            #pastePartial {
                background: var(--accent) !important;
                border-color: var(--accent) !important;
                color: #1d1509 !important;
            }
            #dismissWindow {
                color: var(--muted) !important;
            }
            #historyPanel {
                border-top: 1px solid var(--line);
                display: none;
                margin-top: 10px;
                padding-top: 10px;
                -webkit-app-region: no-drag;
            }
            .historyItem {
                display: grid;
                grid-template-columns: 1fr auto auto;
                gap: 7px;
                align-items: center;
                padding: 7px 0;
            }
            .historyText {
                color: var(--ink);
                font-size: 11px;
                line-height: 1.3;
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .historyMeta {
                color: var(--faint);
                display: block;
                font-size: 10px;
            }
            .historyItem button {
                background: var(--bg-chip);
                border: 1px solid var(--line-soft);
                border-radius: 6px;
                color: var(--ink);
                cursor: pointer;
                font: inherit;
                font-size: 11px;
                font-weight: 700;
                height: 26px;
                padding: 0 9px;
            }
            #runtimeInfo {
                color: var(--faint);
                font-size: 10px;
                margin-top: auto;
                padding-top: 10px;
                overflow-wrap: anywhere;
            }
        </style>
    </head>
<body data-phase="idle">
    <div class="titlebar">
        <div></div>
        <div class="apptitle">Whisper Desktop</div>
        <button id="closeWindow" type="button" aria-label="Close window" title="Close">&#x2715;</button>
    </div>
    <main>
        <div class="statusRow">
            <div id="status">Ready</div>
            <button id="settingsButton" type="button" title="Open settings">Settings</button>
        </div>
        <p id="hotkeyHint">Press shortcut to start/stop recording</p>
        <div id="selectedText"></div>
        <div class="wavePanel">
            <div class="wave">
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span><span></span>
                <span></span>
            </div>
        </div>
        <div id="previewPanel">
            <div id="previewMeta">Inserted at your cursor</div>
            <div id="previewText">Waiting for speech.</div>
            <div id="recoveryActions">
                <button id="retryRecovery" type="button">Retry Saved Audio</button>
                <button id="copyPartial" type="button">Copy Draft Text</button>
                <button id="pastePartial" type="button">Paste Draft</button>
                <button id="retryMic" type="button">Retry Mic</button>
                <button id="testMic" type="button">Test Mic</button>
                <button id="retryPaste" type="button">Retry Paste</button>
                <button id="undoLastInsert" type="button">Undo Last Insert</button>
                <button id="copyOutput" type="button">Copy Text</button>
                <button id="showHistory" type="button">History</button>
                <button id="copyRecoveryCommand" type="button">Copy Retry Command</button>
                <button id="openSettings" type="button">Settings</button>
                <button id="dismissWindow" type="button">Close</button>
            </div>
            <div id="historyPanel"></div>
        </div>
        <div id="runtimeInfo">Loading runtime config...</div>
    </main>
    <script src="./src/renderer/init.js"></script>
</body>
</html>
