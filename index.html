<!DOCTYPE html>
<html>
    <head>
        <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
        <title>Whisper Desktop</title>
        <style>
            :root {
                --ink: #171614;
                --muted: #645f56;
                --paper: rgba(250, 247, 239, 0.92);
                --line: rgba(23, 22, 20, 0.14);
                --recording: #b3261e;
                --working: #2f5f6f;
                --done: #2f6b3f;
                --accent: #d18a00;
            }
            body {
                font-family: "Aptos", "Segoe UI", sans-serif;
                background-color: var(--paper);
                color: var(--ink);
                margin: 0;
                padding: 18px;
                border: 1px solid rgba(255, 255, 255, 0.55);
                border-radius: 8px;
                box-shadow: 0 18px 42px rgba(0, 0, 0, 0.18);
                backdrop-filter: blur(18px) saturate(1.15);
                -webkit-backdrop-filter: blur(18px) saturate(1.15);
                user-select: none;
                -webkit-user-select: none;
                -webkit-app-region: drag;
            }
            .topline {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 14px;
                margin-bottom: 10px;
            }
            h1 {
                font-size: 17px;
                line-height: 1.15;
                margin: 0;
                letter-spacing: 0;
            }
            p {
                font-size: 12px;
                color: var(--muted);
                margin: 0 0 12px;
            }
            #modeChip {
                border: 1px solid var(--line);
                border-radius: 999px;
                color: var(--muted);
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0;
                padding: 4px 8px;
                white-space: nowrap;
            }
            #status {
                font-size: 14px;
                font-weight: bold;
                margin-bottom: 10px;
            }
            #runtimeInfo {
                font-size: 11px;
                color: var(--muted);
                margin-top: 10px;
                overflow-wrap: anywhere;
            }
            #previewPanel {
                background: rgba(255, 255, 255, 0.52);
                border: 1px solid var(--line);
                border-radius: 7px;
                min-height: 82px;
                max-height: 180px;
                overflow: hidden;
                padding: 10px;
            }
            #previewMeta {
                color: var(--muted);
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.04em;
                margin-bottom: 7px;
                text-transform: uppercase;
            }
            #previewText {
                color: var(--ink);
                font-size: 13px;
                line-height: 1.38;
                max-height: 116px;
                overflow: hidden;
                white-space: pre-wrap;
                overflow-wrap: anywhere;
            }
            #recoveryActions {
                display: none;
                flex-wrap: wrap;
                gap: 8px;
                margin-top: 10px;
                -webkit-app-region: no-drag;
            }
            #recoveryActions button {
                background: rgba(255, 255, 255, 0.68);
                border: 1px solid var(--line);
                border-radius: 6px;
                color: var(--ink);
                cursor: pointer;
                font: inherit;
                font-size: 11px;
                font-weight: 700;
                height: 30px;
                padding: 0 10px;
            }
            #retryRecovery {
                background: var(--working);
                border-color: var(--working);
                color: white;
            }
            #retryMic,
            #retryPaste,
            #pastePartial {
                background: var(--working);
                border-color: var(--working);
                color: white;
            }
            #dismissWindow {
                color: var(--muted);
            }
            #historyPanel {
                border-top: 1px solid var(--line);
                display: none;
                margin-top: 10px;
                padding-top: 10px;
                -webkit-app-region: no-drag;
            }
            .historyItem {
                display: grid;
                grid-template-columns: 1fr auto auto;
                gap: 7px;
                align-items: center;
                padding: 7px 0;
            }
            .historyText {
                color: var(--ink);
                font-size: 11px;
                line-height: 1.3;
                min-width: 0;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }
            .historyMeta {
                color: var(--muted);
                display: block;
                font-size: 10px;
            }
            .historyItem button {
                background: rgba(255, 255, 255, 0.68);
                border: 1px solid var(--line);
                border-radius: 6px;
                color: var(--ink);
                cursor: pointer;
                font: inherit;
                font-size: 11px;
                font-weight: 700;
                height: 28px;
                padding: 0 9px;
            }
            #selectedText {
                border-left: 3px solid var(--accent);
                color: var(--muted);
                display: none;
                font-size: 11px;
                line-height: 1.35;
                margin: 8px 0 10px;
                max-height: 42px;
                overflow: hidden;
                padding-left: 8px;
                white-space: pre-wrap;
                overflow-wrap: anywhere;
            }
        </style>
    </head>
<body>
    <div class="topline">
        <h1>Whisper Desktop</h1>
        <div id="modeChip">Dictation</div>
    </div>
    <p id="hotkeyHint">Press shortcut to start/stop recording</p>
    <div id="status">Ready</div>
    <div id="selectedText"></div>
    <div id="previewPanel">
        <div id="previewMeta">Preview</div>
        <div id="previewText">Waiting for speech.</div>
        <div id="recoveryActions">
            <button id="retryRecovery" type="button">Retry Saved Audio</button>
            <button id="copyPartial" type="button">Copy Draft Text</button>
            <button id="pastePartial" type="button">Paste Draft</button>
            <button id="retryMic" type="button">Retry Mic</button>
            <button id="testMic" type="button">Test Mic</button>
            <button id="retryPaste" type="button">Retry Paste</button>
            <button id="undoLastInsert" type="button">Undo Last Insert</button>
            <button id="copyOutput" type="button">Copy Text</button>
            <button id="showHistory" type="button">History</button>
            <button id="copyRecoveryCommand" type="button">Copy Retry Command</button>
            <button id="openSettings" type="button">Settings</button>
            <button id="dismissWindow" type="button">Close</button>
        </div>
        <div id="historyPanel"></div>
    </div>
    <div id="runtimeInfo">Loading runtime config...</div>
    <script src="./src/renderer/init.js"></script>
</body>
</html>
