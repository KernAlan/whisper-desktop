<!DOCTYPE html>
<html>
  <head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
    <title>Whisper Desktop Settings</title>
    <style>
      :root {
        --ink: #191713;
        --muted: #6a6257;
        --paper: #f5f2ea;
        --panel: #fffdf7;
        --line: #d8d0c2;
        --field: #fbf8f0;
        --accent: #8f5d00;
        --accent-ink: #fffaf0;
        --good: #2f6b3f;
        --bad: #9d2f24;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: var(--paper);
        color: var(--ink);
        font-family: "Aptos", "Segoe UI", sans-serif;
        margin: 0;
      }

      main {
        margin: 0 auto;
        max-width: 820px;
        padding: 22px;
      }

      header {
        align-items: end;
        border-bottom: 1px solid var(--line);
        display: flex;
        justify-content: space-between;
        margin-bottom: 18px;
        padding-bottom: 14px;
      }

      h1 {
        font-size: 22px;
        line-height: 1.1;
        margin: 0;
      }

      #status {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .grid {
        display: grid;
        gap: 14px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .connection-head {
        align-items: center;
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .connection-head h2 {
        margin: 0;
      }

      .connection-state {
        align-items: center;
        color: var(--muted);
        display: inline-flex;
        font-size: 11px;
        font-weight: 700;
        gap: 6px;
      }

      .connection-state::before {
        background: var(--bad);
        border-radius: 50%;
        content: "";
        height: 7px;
        width: 7px;
      }

      .connection-state.connected::before {
        background: var(--good);
      }

      .credential-controls {
        align-items: end;
        display: grid;
        gap: 8px;
        grid-template-columns: minmax(0, 1fr) auto auto;
      }

      .credential-controls button {
        min-width: 92px;
      }

      .hint {
        color: var(--muted);
        font-size: 11px;
        line-height: 1.4;
        margin: 8px 0 0;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
      }

      section.full {
        grid-column: 1 / -1;
      }

      h2 {
        font-size: 13px;
        letter-spacing: 0;
        margin: 0 0 12px;
      }

      label {
        color: var(--muted);
        display: block;
        font-size: 11px;
        font-weight: 700;
        margin-bottom: 6px;
      }

      input,
      select {
        background: var(--field);
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--ink);
        font: inherit;
        font-size: 13px;
        height: 34px;
        padding: 6px 8px;
        width: 100%;
      }

      .row {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-bottom: 10px;
      }

      .segmented {
        display: grid;
        gap: 6px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .segmented button,
      button {
        border: 1px solid var(--line);
        border-radius: 6px;
        cursor: pointer;
        font: inherit;
        font-size: 12px;
        font-weight: 700;
        height: 34px;
        padding: 0 12px;
      }

      button {
        background: #eee7da;
        color: var(--ink);
      }

      button.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: var(--accent-ink);
      }

      .segmented button.active {
        background: var(--ink);
        border-color: var(--ink);
        color: white;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
        margin-top: 14px;
      }

      .terms {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
        min-height: 34px;
      }

      .subbar {
        display: flex;
        gap: 8px;
        justify-content: flex-start;
        margin-top: 10px;
      }

      .term {
        align-items: center;
        background: #efe7d8;
        border: 1px solid var(--line);
        border-radius: 999px;
        display: inline-flex;
        gap: 6px;
        max-width: 100%;
        padding: 4px 6px 4px 10px;
      }

      .term span {
        font-size: 12px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .term button {
        border-radius: 999px;
        height: 22px;
        line-height: 20px;
        padding: 0;
        width: 22px;
      }

      .ok {
        color: var(--good);
      }

      .error {
        color: var(--bad);
      }

      @media (max-width: 700px) {
        .grid,
        .row,
        .credential-controls {
          grid-template-columns: 1fr;
        }

        section.full {
          grid-column: auto;
        }

        .credential-controls button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Settings</h1>
        <div id="status">Loading</div>
      </header>

      <div class="grid">
        <section class="full">
          <div class="connection-head">
            <h2>Speech Service</h2>
            <div id="credentialStatus" class="connection-state">Not configured</div>
          </div>
          <div class="credential-controls">
            <div>
              <label for="apiKey">Groq API key</label>
              <input id="apiKey" type="password" autocomplete="off" spellcheck="false" placeholder="Enter a new key">
            </div>
            <button id="saveApiKey" class="primary" type="button">Save Key</button>
            <button id="clearApiKey" type="button">Clear Key</button>
          </div>
          <p id="credentialHint" class="hint">Keys are encrypted with the operating system credential store.</p>
        </section>

        <section>
          <h2>Dictation</h2>
          <label>Mode</label>
          <div class="segmented" id="dictationMode">
            <button type="button" data-mode="polished">Polished</button>
            <button type="button" data-mode="fast">Fast</button>
          </div>
          <div class="row" style="margin-top: 12px;">
            <div>
              <label for="previewIntervalMs">Preview ms</label>
              <input id="previewIntervalMs" type="number" min="1000" step="100">
            </div>
            <div>
              <label for="timeoutMs">Timeout ms</label>
              <input id="timeoutMs" type="number" min="3000" step="1000">
            </div>
          </div>
          <div class="row">
            <div>
              <label for="doneHideWindowMs">Done hide ms</label>
              <input id="doneHideWindowMs" type="number" min="100" step="100">
            </div>
          </div>
        </section>

        <section>
          <h2>Hotkeys</h2>
          <div class="row">
            <div>
              <label for="shortcut">Dictation</label>
              <input id="shortcut" spellcheck="false">
            </div>
            <div>
              <label for="commandShortcut">Command</label>
              <input id="commandShortcut" spellcheck="false">
            </div>
          </div>
        </section>

        <section>
          <h2>Models</h2>
          <div class="row">
            <div>
              <label for="model">Whisper</label>
              <input id="model" spellcheck="false">
            </div>
            <div>
              <label for="textModel">Text</label>
              <input id="textModel" spellcheck="false">
            </div>
          </div>
        </section>

        <section>
          <h2>Long Text</h2>
          <div class="row">
            <div>
              <label for="polishChunkWords">Polish words</label>
              <input id="polishChunkWords" type="number" min="100" step="50">
            </div>
            <div>
              <label for="polishMaxWords">Polish max</label>
              <input id="polishMaxWords" type="number" min="100" step="100">
            </div>
          </div>
          <div class="row">
            <div>
              <label for="pasteChunkChars">Paste chars</label>
              <input id="pasteChunkChars" type="number" min="250" step="250">
            </div>
            <div>
              <label for="pasteChunkDelayMs">Paste delay ms</label>
              <input id="pasteChunkDelayMs" type="number" min="10" step="10">
            </div>
          </div>
        </section>

        <section class="full">
          <h2>Dictionary</h2>
          <div class="row">
            <div>
              <label for="dictionaryTerm">Term</label>
              <input id="dictionaryTerm" spellcheck="false">
            </div>
            <div style="align-self: end;">
              <button id="addTerm" type="button">Add Term</button>
            </div>
          </div>
          <div class="terms" id="terms"></div>
          <div class="subbar">
            <button id="suggestTerms" type="button">Suggest Terms</button>
            <button id="addSuggestions" type="button">Add Suggestions</button>
          </div>
          <div class="terms" id="suggestions"></div>
        </section>
      </div>

      <div class="toolbar">
        <button id="testMic" type="button">Test Mic</button>
        <button id="reload" type="button">Reload</button>
        <button id="reset" type="button">Reset</button>
        <button id="save" class="primary" type="button">Save</button>
      </div>
    </main>

    <script type="module" src="./src/renderer/settings.js"></script>
  </body>
</html>
